<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login</title>
    <style>
        /* Import Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('image/bg_login.jpg') no-repeat center center/cover;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            width: 400px;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            color: white;
            font-weight: 500;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: none;
            border-radius: 10px;
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3d87c4;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        button:hover {
            background: #186db2;
        }
        .footer-links a{
          color: #113b59;
          font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" required>
                
                <label for="password">Password</label>
                <input type="password" id="password" required>
                
                <button type="submit">Login</button>
            </form>
            <div class="footer-links">
                <p style="color: white; font-size: 12px;">Forget<a href="#" style="font-size: 14px;"> Password?</a></p>
                <p style="color: white; font-size: 12px;">Don't have an account? <a href="#" style="font-size: 14px;">Register</a></p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            if (email === "" || password === "") {
                alert("Please fill in both fields.");
            } else {
                alert("Login successful!");
            }
        });
    </script>
</body>
</html>
